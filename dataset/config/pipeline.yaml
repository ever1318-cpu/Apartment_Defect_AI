version: 1
seed: 42

paths:
  raw: dataset/raw
  interim: dataset/interim
  processed: dataset/processed
  manifest: dataset/processed/records.jsonl

split:
  group_field: group_id
  stratify_field: label
  ratios:
    train: 0.80
    validation: 0.10
    test: 0.10

validation:
  require_files: true
  allowed_extensions: [jpg, jpeg, png, webp, tif, tiff]

augmentation:
  train_only: true
  transforms:
    - name: horizontal_flip
      probability: 0.50
      parameters: {}
    - name: brightness_contrast
      probability: 0.40
      parameters:
        limit: 0.20
    - name: rotate
      probability: 0.30
      parameters:
        degrees: 8

active_learning:
  strategy: entropy
  max_per_group: 1

vision:
  inference:
    backend: reference
    validate_images: true
    continue_on_error: true
  model_version: vision-mvp-1
  quality:
    reject_unacceptable: true
  classification:
    tasks: [space, trade, component]
    confidence_threshold: 0.25
    top_k: 3
  detection:
    confidence_threshold: 0.25
    nms_iou_threshold: 0.50
  severity:
    medium_area: 0.02
    high_area: 0.10
