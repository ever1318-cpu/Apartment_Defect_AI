version: 1
seed: 42

paths:
  raw: dataset/raw
  interim: dataset/interim
  processed: dataset/processed
  manifest: dataset/processed/records.jsonl

split:
  group_field: group_id
  stratify_field: label
  ratios:
    train: 0.80
    validation: 0.10
    test: 0.10

validation:
  require_files: true
  allowed_extensions: [jpg, jpeg, png, webp, tif, tiff]

augmentation:
  train_only: true
  transforms:
    - name: horizontal_flip
      probability: 0.50
      parameters: {}
    - name: brightness_contrast
      probability: 0.40
      parameters:
        limit: 0.20
    - name: rotate
      probability: 0.30
      parameters:
        degrees: 8

active_learning:
  strategy: entropy
  max_per_group: 1

vision:
  inference:
    backend: reference
    model: null
    providers: []
    validate_images: true
    continue_on_error: true
  model_version: vision-mvp-1
  quality:
    reject_unacceptable: true
  classification:
    tasks: [space, trade, component]
    confidence_threshold: 0.25
    top_k: 3
  detection:
    confidence_threshold: 0.25
    nms_iou_threshold: 0.50
  severity:
    medium_area: 0.02
    high_area: 0.10
  evaluation:
    confidence_threshold: 0.25
    iou_threshold: 0.50
  training:
    tasks: [classification, detection, severity]
    batch_size: 16
    epochs: 5
    learning_rate: 0.001
    random_seed: 42
    device: auto
    onnx_export:
      opset: 17
      dynamic_batch: true
      input_shape: [1, 3, 224, 224]
  packaging:
    format_version: "1.0"
    checksum_algorithm: sha256
    strict_validation: true
    default_deployment_profile: cpu
  serving:
    registry_directory: model-registry
    default_model_name: apartment-defect
    host: 127.0.0.1
    port: 8000
    workers: 1
    max_upload_bytes: 10485760
    max_batch_size: 16
    confidence_threshold: 0.25
    session_cache_size: 2
    inference_cache_enabled: false
    inference_cache_size: 128
    compatibility_strictness: fail
    allowed_mime_types: [image/jpeg, image/png, image/webp, image/tiff]
    temp_directory: null
    logging_level: INFO
    request_timeout_seconds: 30
    model_load_timeout_seconds: 30
    max_concurrent_requests: 8
    max_batch_bytes: 41943040
    max_image_pixels: 25000000
    max_json_depth: 12

field_data:
  max_dimension: 16384
  max_file_bytes: 52428800
  near_duplicate_threshold: 0.92
  privacy_mode: raw
  deterministic_seed: 42
